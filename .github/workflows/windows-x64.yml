name: Windows x64 CLI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-x64.yml"
      - "Package.swift"
      - "Sources/ConvertCore/**"
      - "Sources/ConvertVideo2MP3CLI/**"
      - "Tests/ConvertCoreTests/**"
      - "scripts/build_windows_x64.ps1"

jobs:
  build:
    name: Build Windows x64 CLI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift toolchain
        uses: SwiftyLab/setup-swift@latest

      - name: Build package
        shell: pwsh
        run: |
          where.exe swift
          swift --version
          ./scripts/build_windows_x64.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConvertVideo2MP3-windows-x64
          path: dist/ConvertVideo2MP3-windows-x64.zip
