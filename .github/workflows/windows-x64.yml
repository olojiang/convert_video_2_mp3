name: Windows x64 CLI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-x64.yml"
      - "Package.swift"
      - "Sources/ConvertCore/**"
      - "Sources/ConvertVideo2MP3CLI/**"
      - "Tests/ConvertCoreTests/**"
      - "scripts/build_windows_x64.ps1"

jobs:
  build:
    name: Build Windows x64 CLI
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift toolchain
        shell: pwsh
        run: |
          winget install --id Swift.Toolchain -e --source winget --accept-package-agreements --accept-source-agreements
          $swift = Get-ChildItem -Path "$env:LOCALAPPDATA\Programs\Swift", "C:\Program Files\Swift" -Recurse -Filter "swift.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if ($null -eq $swift) {
            throw "swift.exe was not found after installing Swift.Toolchain"
          }
          $swiftBin = Split-Path $swift.FullName -Parent
          "$swiftBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "SWIFT_BIN=$swiftBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $swift.FullName --version

      - name: Build package
        shell: pwsh
        run: |
          where.exe swift
          swift --version
          ./scripts/build_windows_x64.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConvertVideo2MP3-windows-x64
          path: dist/ConvertVideo2MP3-windows-x64.zip
